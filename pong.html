<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Breakout Pong</title>

  <style>
    body {
      margin: 0;
      background: black;
      overflow: hidden;
    }
    canvas {
      display: block;
      margin: auto;
      background: #111;
    }
  </style>
</head>
<body>

<canvas id="game" width="800" height="500"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

// Paddle
let paddle = {
  width: 120,
  height: 15,
  x: canvas.width / 2 - 60,
  y: canvas.height - 30,
  speed: 10,
  dx: 0
};

// Ball
let ball = {
  x: canvas.width / 2,
  y: canvas.height - 50,
  radius: 10,
  speed: 6,
  dx: 4,
  dy: -4
};

// Bricks
const brick = {
  rows: 5,
  cols: 8,
  width: 80,
  height: 25,
  padding: 10,
  offsetTop: 40,
  offsetLeft: 35
};

let bricks = [];

function createBricks() {
  for (let r = 0; r < brick.rows; r++) {
    bricks[r] = [];
    for (let c = 0; c < brick.cols; c++) {
      bricks[r][c] = { x: 0, y: 0, destroyed: false };
    }
  }
}

createBricks();

// Draw paddle
function drawPaddle() {
  ctx.fillStyle = "white";
  ctx.fillRect(paddle.x, paddle.y, paddle.width, paddle.height);
}

// Draw ball
function drawBall() {
  ctx.fillStyle = "white";
  ctx.beginPath();
  ctx.arc(ball.x, ball.y, ball.radius, 0, Math.PI * 2);
  ctx.fill();
  ctx.closePath();
}

// Draw bricks
function drawBricks() {
  for (let r = 0; r < brick.rows; r++) {
    for (let c = 0; c < brick.cols; c++) {
      if (!bricks[r][c].destroyed) {
        let bx = c * (brick.width + brick.padding) + brick.offsetLeft;
        let by = r * (brick.height + brick.padding) + brick.offsetTop;

        bricks[r][c].x = bx;
        bricks[r][c].y = by;

        ctx.fillStyle = "#00aaff";
        ctx.fillRect(bx, by, brick.width, brick.height);
      }
    }
  }
}

// Move paddle
function movePaddle() {
  paddle.x += paddle.dx;

  if (paddle.x < 0) paddle.x = 0;
  if (paddle.x + paddle.width > canvas.width)
    paddle.x = canvas.width - paddle.width;
}

// Move ball
function moveBall() {
  ball.x += ball.dx;
  ball.y += ball.dy;

  // Wall bounce
  if (ball.x + ball.radius > canvas.width || ball.x - ball.radius < 0)
    ball.dx *= -1;

  if (ball.y - ball.radius < 0)
    ball.dy *= -1;

  // Paddle bounce
  if (
    ball.y + ball.radius > paddle.y &&
    ball.x > paddle.x &&
    ball.x < paddle.x + paddle.width
  ) {
    ball.dy *= -1;
  }

  // Bottom reset
  if (ball.y + ball.radius > canvas.height) {
    ball.x = canvas.width / 2;
    ball.y = canvas.height - 50;
    ball.dx = 4;
    ball.dy = -4;
  }

  // Brick collision
  for (let r = 0; r < brick.rows; r++) {
    for (let c = 0; c < brick.cols; c++) {
      let b = bricks[r][c];
      if (!b.destroyed) {
        if (
          ball.x > b.x &&
          ball.x < b.x + brick.width &&
          ball.y > b.y &&
          ball.y < b.y + brick.height
        ) {
          ball.dy *= -1;
          b.destroyed = true;
        }
      }
    }
  }
}

// Draw everything
function draw() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  drawPaddle();
  drawBall();
  drawBricks();
}

// Game loop
function update() {
  movePaddle();
  moveBall();
  draw();
  requestAnimationFrame(update);
}

update();

// Controls
document.addEventListener("keydown", e => {
  if (e.key === "ArrowLeft") paddle.dx = -paddle.speed;
  if (e.key === "ArrowRight") paddle.dx = paddle.speed;
});

document.addEventListener("keyup", e => {
  if (e.key === "ArrowLeft" || e.key === "ArrowRight") paddle.dx = 0;
});
</script>

</body>
</html>
