<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Login</title>

  <style>
    body {
      background: #1e90ff;
      font-family: Arial, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
      color: white;
    }

    .box {
      background: #003f88;
      padding: 30px;
      border-radius: 10px;
      text-align: center;
      width: 300px;
    }

    input {
      width: 90%;
      padding: 10px;
      margin-top: 15px;
      border-radius: 5px;
      border: none;
      font-size: 16px;
    }

    button {
      margin-top: 20px;
      padding: 10px 20px;
      font-size: 18px;
      background: #005bbb;
      color: white;
      border: none;
      border-radius: 5px;
      cursor: pointer;
    }

    button:hover {
      background: #0077ff;
    }
  </style>
</head>
<body>

<div class="box">
  <h2>Enter Password</h2>
  <input type="password" id="pass" placeholder="Password">
  <button onclick="checkPass()">Enter</button>
  <p id="error" style="color: red; display: none;">Incorrect password</p>
</div>

<script>
function checkPass() {
  const input = document.getElementById("pass").value;

  if (input === "MasterJacob123") {
    window.location.href = "home.html"; // your game hub page
  } else {
    document.getElementById("error").style.display = "block";
  }
}
</script>

</body>
</html>
