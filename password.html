<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Enter Key</title>
  <style>
    body {
      background: #1e90ff;
      color: white;
      font-family: Arial, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }
    .box {
      background: #003f88;
      padding: 30px;
      border-radius: 10px;
      text-align: center;
    }
    input {
      padding: 10px;
      font-size: 18px;
      border-radius: 6px;
      border: none;
      width: 200px;
      margin-bottom: 10px;
    }
    button {
      padding: 10px 20px;
      font-size: 18px;
      border-radius: 6px;
      border: none;
      background: #00d4ff;
      cursor: pointer;
    }
  </style>
</head>
<body>

<div class="box">
  <h2>Enter Access Key</h2>
  <input type="password" id="key" placeholder="Access Key">
  <br>
  <button onclick="checkKey()">Enter</button>
</div>

<script>
  function checkKey() {
    const key = document.getElementById("key").value;

    // CHANGE THIS TO YOUR SECRET KEY
    const correctKey = "master123";

    if (key === correctKey) {
      window.location.href = "index.html";
    } else {
      alert("Incorrect key");
    }
  }
</script>

</body>
</html>
