<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">

  <title>Master's Gaming Hub</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #1e90ff;
      color: white;
    }

    header {
      background: #003f88;
      padding: 20px;
      text-align: center;
      font-size: 32px;
      font-weight: bold;
      letter-spacing: 1px;
    }

    #search-container {
      text-align: center;
      margin: 20px;
    }

    #search {
      width: 60%;
      max-width: 500px;
      padding: 12px;
      font-size: 18px;
      border-radius: 8px;
      border: none;
      outline: none;
    }

    .section-title {
      font-size: 26px;
      margin: 20px;
      border-left: 5px solid white;
      padding-left: 10px;
    }

    .game-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 20px;
      padding: 20px;
    }

    .game-card {
      background: #005bbb;
      padding: 15px;
      border-radius: 10px;
      text-align: center;
      border: 2px solid #003f88;
      transition: 0.2s;
    }

    .game-card:hover {
      transform: scale(1.05);
      background: #0077ff;
    }

    button {
      background: none;
      border: none;
      color: white;
      font-size: 20px;
      font-weight: bold;
      cursor: pointer;
    }

    button:hover {
      text-decoration: underline;
    }

    #gameFrameContainer {
      width: 100%;
      height: 600px;
      display: none;
      margin-top: 20px;
    }

    #gameFrame {
      width: 100%;
      height: 100%;
      border: none;
    }
  </style>
</head>
<body>

<header>Master's Gaming Hub</header>

<div id="search-container">
  <input type="text" id="search" placeholder="Search for a game...">
</div>

<!-- CATEGORY 1 -->
<h2 class="section-title">🎮 Board & Strategy Games</h2>
<div class="game-grid">

  <div class="game-card" data-name="Goose Game">
    <button onclick="openGame('https://toytheater.com/goose-game/')">Goose Game</button>
  </div>

  <div class="game-card" data-name="Checkers">
    <button onclick="openGame('https://toytheater.com/checkers/')">Checkers</button>
  </div>

  <div class="game-card" data-name="Chess">
    <button onclick="openGame('https://toytheater.com/chess/')">Chess</button>
  </div>

  <div class="game-card" data-name="Connect 4">
    <button onclick="openGame('https://toytheater.com/connect-4/')">Connect 4</button>
  </div>

  <div class="game-card" data-name="Reversi">
    <button onclick="openGame('https://toytheater.com/reversi/')">Reversi</button>
  </div>

</div>

<!-- CATEGORY 2 -->
<h2 class="section-title">⚡ Arcade & Action Games</h2>
<div class="game-grid">

  <div class="game-card" data-name="Space Race">
    <button onclick="openGame('https://toytheater.com/space-race/')">Space Race</button>
  </div>

  <div class="game-card" data-name="Brick Breaker">
    <button onclick="openGame('https://toytheater.com/brick-breaker/')">Brick Breaker</button>
  </div>

  <div class="game-card" data-name="Car Race">
    <button onclick="openGame('https://toytheater.com/car-race/')">Car Race</button>
  </div>

  <div class="game-card" data-name="Maze Game">
    <button onclick="openGame('https://toytheater.com/maze-game/')">Maze Game</button>
  </div>

  <div class="game-card" data-name="Platform Game">
    <button onclick="openGame('https://toytheater.com/platform-game/')">Platform Game</button>
  </div>

</div>

<!-- GAME VIEWER -->
<div id="gameFrameContainer">
  <iframe id="gameFrame"></iframe>
</div>

<script>
  const searchInput = document.getElementById("search");
  const gameCards = document.querySelectorAll(".game-card");

  searchInput.addEventListener("input", () => {
    const query = searchInput.value.toLowerCase();

    gameCards.forEach(card => {
      const name = card.getAttribute("data-name").toLowerCase();
      card.style.display = name.includes(query) ? "block" : "none";
    });
  });

  function openGame(url) {
    document.getElementById("gameFrameContainer").style.display = "block";
    document.getElementById("gameFrame").src = url;
    window.scrollTo(0, document.body.scrollHeight);
  }
</script>

</body>
</html>
