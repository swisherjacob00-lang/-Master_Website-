<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">

  <title>Master's Gaming Hub</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background-image: url('YOUR_IMAGE_FILE.jpg');
      background-size: cover;
      background-attachment: fixed;
      background-position: center;
      color: white;
      overflow-y: scroll;
    }

    header {
      background: rgba(0, 0, 0, 0.6);
      padding: 20px;
      text-align: center;
      font-size: 32px;
      font-weight: bold;
      letter-spacing: 1px;
      position: sticky;
      top: 0;
      z-index: 10;
      backdrop-filter: blur(6px);
    }

    #search-container {
      text-align: center;
      margin: 20px;
    }

    #search {
      width: 60%;
      max-width: 500px;
      padding: 12px;
      font-size: 18px;
      border-radius: 8px;
      border: none;
      outline: none;
    }

    .section-title {
      font-size: 26px;
      margin: 20px;
      border-left: 5px solid white;
      padding-left: 10px;
      background: rgba(0, 0, 0, 0.4);
      display: inline-block;
      backdrop-filter: blur(4px);
    }

    .game-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 20px;
      padding: 20px;
    }

    .game-card {
      background: rgba(0, 0, 0, 0.55);
      padding: 15px;
      border-radius: 10px;
      text-align: center;
      border: 2px solid rgba(255, 255, 255, 0.3);
      transition: 0.2s;
      cursor: pointer;
      backdrop-filter: blur(4px);
    }

    .game-card:hover {
      transform: scale(1.05);
      background: rgba(0, 0, 0, 0.75);
    }

    .game-card span {
      font-size: 20px;
      font-weight: bold;
    }

    #gameFrameContainer {
      width: 100%;
      height: 600px;
      margin-top: 20px;
      display: block;
    }

    #gameFrame {
      width: 100%;
      height: 100%;
      border: none;
      border-radius: 10px;
      background: black;
    }
  </style>
</head>
<body>

<header>Master's Gaming Hub</header>

<div id="search-container">
  <input type="text" id="search" placeholder="Search for a game...">
</div>

<!-- CATEGORY 1 -->
<h2 class="section-title">🎮 Board & Strategy Games</h2>
<div class="game-grid">

  <div class="game-card" data-name="Goose Game" onclick="openGame('https://toytheater.com/goose-game/')">
    <span>Goose Game</span>
  </div>

  <div class="game-card" data-name="Checkers" onclick="openGame('https://toytheater.com/checkers/')">
    <span>Checkers</span>
  </div>

  <div class="game-card" data-name="Chess" onclick="openGame('https://toytheater.com/chess/')">
    <span>Chess</span>
  </div>

  <div class="game-card" data-name="Connect 4" onclick="openGame('https://toytheater.com/connect-4/')">
    <span>Connect 4</span>
  </div>

  <div class="game-card" data-name="Reversi" onclick="openGame('https://toytheater.com/reversi/')">
    <span>Reversi</span>
  </div>

</div>

<!-- CATEGORY 2 -->
<h2 class="section-title">⚡ Arcade & Action Games</h2>
<div class="game-grid">

  <div class="game-card" data-name="Space Race" onclick="openGame('https://toytheater.com/space-race/')">
    <span>Space Race</span>
  </div>

  <div class="game-card" data-name="Brick Breaker" onclick="openGame('https://toytheater.com/brick-breaker/')">
    <span>Brick Breaker</span>
  </div>

  <div class="game-card" data-name="Car Race" onclick="openGame('https://toytheater.com/car-race/')">
    <span>Car Race</span>
  </div>

  <div class="game-card" data-name="Maze Game" onclick="openGame('https://toytheater.com/maze-game/')">
    <span>Maze Game</span>
  </div>

  <div class="game-card" data-name="Platform Game" onclick="openGame('https://toytheater.com/platform-game/')">
    <span>Platform Game</span>
  </div>

</div>

<!-- GAME VIEWER -->
<div id="gameFrameContainer">
  <iframe id="gameFrame" src="https://toytheater.com/goose-game/"></iframe>
</div>

<script>
  const searchInput = document.getElementById("search");
  const gameCards = document.querySelectorAll(".game-card");

  searchInput.addEventListener("input", () => {
    const query = searchInput.value.toLowerCase();

    gameCards.forEach(card => {
      const name = card.getAttribute("data-name").toLowerCase();
      card.style.display = name.includes(query) ? "block" : "none";
    });
  });

  function openGame(url) {
    document.getElementById("gameFrame").src = url;
  }
</script>

</body>
</html>
