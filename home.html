<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>¡Jacob's Master Gaming Hub!</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #1a4fa3, #2f6fd1, #4a8df0);
      color: white;
    }

    header {
      background: rgba(0, 0, 0, 0.7);
      padding: 20px;
      text-align: center;
      font-size: 32px;
      font-weight: bold;
      position: sticky;
      top: 0;
      z-index: 10;
      backdrop-filter: blur(6px);
    }

    #game-frame-container {
      width: 100%;
      height: 600px;
      background: rgba(0,0,0,0.6);
      backdrop-filter: blur(6px);
      border-top: 3px solid white;
      display: none;
    }

    #game-frame {
      width: 100%;
      height: 100%;
      border: none;
    }

    #search-container {
      text-align: center;
      margin: 20px;
    }

    #search {
      width: 60%;
      max-width: 500px;
      padding: 12px;
      font-size: 18px;
      border-radius: 8px;
      border: none;
      outline: none;
    }

    .section-title {
      font-size: 26px;
      margin: 20px;
      border-left: 5px solid white;
      padding-left: 10px;
      background: rgba(0, 0, 0, 0.4);
      display: inline-block;
      backdrop-filter: blur(4px);
    }

    .suggested-label {
      font-size: 20px;
      margin: 0 20px;
      opacity: 0.85;
      font-style: italic;
    }

    .game-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 20px;
      padding: 20px;
    }

    .game-card {
      background: rgba(0, 0, 0, 0.55);
      padding: 15px;
      border-radius: 10px;
      border: 2px solid rgba(255, 255, 255, 0.3);
      backdrop-filter: blur(4px);
    }

    .game-title {
      text-align: center;
      font-size: 20px;
      font-weight: bold;
      margin-bottom: 10px;
    }

    .play-btn {
      display: block;
      margin: 0 auto 10px auto;
      padding: 8px 14px;
      font-size: 14px;
      border-radius: 6px;
      border: none;
      cursor: pointer;
      background: #1e88e5;
      color: white;
      text-align: center;
      text-decoration: none;
    }

    .play-btn:hover {
      background: #1565c0;
    }
  </style>
</head>
<body>

<header>¡Jacob's Master Gaming Hub!</header>

<!-- EMBEDDED GAME VIEWER -->
<div id="game-frame-container">
  <iframe id="game-frame"></iframe>
</div>

<script>
  function loadGame(url) {
    const frameContainer = document.getElementById("game-frame-container");
    const frame = document.getElementById("game-frame");

    frame.src = url;
    frameContainer.style.display = "block";

    window.scrollTo({ top: frameContainer.offsetTop - 20, behavior: "smooth" });
  }
</script>

<!-- TOP GAMES -->
<h2 class="section-title">🏁 Top Games</h2>
<div class="game-grid">

  <div class="game-card" data-name="PolyTrack">
    <div class="game-title">PolyTrack</div>
    <button class="play-btn" onclick="loadGame('https://poly-trackonline.github.io/')">Play</button>
  </div>

  <div class="game-card" data-name="Basket Random">
    <div class="game-title">Basket Random</div>
    <button class="play-btn" onclick="loadGame('https://google-pacman.github.io/play/basket-random.html')">Play</button>
  </div>

</div>

<p class="suggested-label">
  Suggested by Alex Bahena — P.S. Franklin was here first!! Get Cookied!! Jake also beat you!!
</p>

<!-- FEATURED -->
<h2 class="section-title">🔥 Featured Games</h2>
<div class="game-grid">

  <div class="game-card" data-name="Slope">
    <div class="game-title">Slope</div>
    <button class="play-btn" onclick="loadGame('https://shortrideonline.github.io/go/class-450.html')">Play</button>
  </div>

  <div class="game-card" data-name="Two Player Slope">
    <div class="game-title">Two Player Slope</div>
    <button class="play-btn" onclick="loadGame('https://shortrideonline.github.io/go/class-800.html')">Play</button>
  </div>

  <div class="game-card" data-name="Tag">
    <div class="game-title">Tag</div>
    <button class="play-btn" onclick="loadGame('https://shortrideonline.github.io/go/class-633.html')">Play</button>
  </div>

  <div class="game-card" data-name="Stickman Hook">
    <div class="game-title">Stickman Hook</div>
    <button class="play-btn" onclick="loadGame('https://shortrideonline.github.io/go/class-406.html')">Play</button>
  </div>

  <div class="game-card" data-name="Off-Road Cargo Rain Simulator">
    <div class="game-title">Off-Road Cargo Rain Simulator</div>
    <button class="play-btn" onclick="loadGame('https://shortrideonline.github.io/go/class-313.html')">Play</button>
  </div>

</div>

<!-- SEARCH BAR -->
<div id="search-container">
  <input type="text" id="search" placeholder="Search for a game...">
</div>

<script>
  function filterGames() {
    const query = document.getElementById("search").value.toLowerCase();
    const cards = document.querySelectorAll(".game-card");

    cards.forEach(card => {
      const name = card.getAttribute("data-name").toLowerCase();
      card.style.display = name.includes(query) ? "block" : "none";
    });
  }

  document.getElementById("search").addEventListener("input", filterGames);
</script>

</body>
</html>
