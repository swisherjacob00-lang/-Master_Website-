<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>¡Jacob's Master Gaming Hub!</title>

<style>
  body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #0d0d0d;
    color: #e6e6e6;
  }

  header {
    background: #111;
    padding: 25px;
    text-align: center;
    font-size: 34px;
    font-weight: bold;
    letter-spacing: 1px;
    border-bottom: 2px solid #222;
    position: sticky;
    top: 0;
    z-index: 10;
  }

  #search-container {
    text-align: center;
    margin: 25px;
  }

  #search {
    width: 60%;
    max-width: 500px;
    padding: 12px;
    font-size: 18px;
    border-radius: 8px;
    border: 2px solid #333;
    background: #1a1a1a;
    color: #e6e6e6;
    outline: none;
  }

  .section-title {
    font-size: 26px;
    margin: 20px;
    padding-left: 12px;
    border-left: 5px solid #4a90e2;
    font-weight: bold;
  }

  .game-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
    gap: 25px;
    padding: 20px;
  }

  .game-card {
    background: #1a1a1a;
    padding: 18px;
    border-radius: 12px;
    border: 2px solid #333;
    transition: 0.2s;
  }

  .game-card:hover {
    transform: translateY(-4px);
    border-color: #4a90e2;
  }

  .game-title {
    text-align: center;
    font-size: 20px;
    font-weight: bold;
    margin-bottom: 12px;
  }

  .play-btn {
    display: block;
    margin: 0 auto;
    padding: 10px 16px;
    font-size: 15px;
    border-radius: 6px;
    border: none;
    cursor: pointer;
    background: #4a90e2;
    color: white;
    text-align: center;
    text-decoration: none;
    transition: 0.2s;
  }

  .play-btn:hover {
    background: #357ac9;
  }
</style>
</head>

<body>

<header>¡Jacob's Master Gaming Hub!</header>

<div id="search-container">
  <input type="text" id="search" placeholder="Search for a game...">
</div>

<h2 class="section-title">🎮 Games</h2>

<div class="game-grid">

  <div class="game-card" data-name="Dino Run">
    <div class="game-title">Dino Run</div>
    <a class="play-btn" href="#" target="_blank">Play</a>
  </div>

  <div class="game-card" data-name="Slope">
    <div class="game-title">Slope</div>
    <a class="play-btn" href="#" target="_blank">Play</a>
  </div>

  <div class="game-card" data-name="Flappy Bird">
    <div class="game-title">Flappy Bird</div>
    <a class="play-btn" href="#" target="_blank">Play</a>
  </div>

  <div class="game-card" data-name="Snake">
    <div class="game-title">Snake</div>
    <a class="play-btn" href="#" target="_blank">Play</a>
  </div>

  <div class="game-card" data-name="Run Game">
    <div class="game-title">Run Game</div>
    <a class="play-btn" href="#" target="_blank">Play</a>
  </div>

  <div class="game-card" data-name="Stack">
    <div class="game-title">Stack</div>
    <a class="play-btn" href="#" target="_blank">Play</a>
  </div>

</div>

<script>
  function filterGames() {
    const query = document.getElementById("search").value.toLowerCase();
    const cards = document.querySelectorAll(".game-card");

    cards.forEach(card => {
      const name = card.getAttribute("data-name").toLowerCase();
      card.style.display = name.includes(query) ? "block" : "none";
    });
  }

  document.getElementById("search").addEventListener("input", filterGames);
</script>

</body>
</html>
