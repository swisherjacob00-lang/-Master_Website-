<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Power School</title>

  <link rel="icon" type="image/png" href="https://raw.githubusercontent.com/google/material-design-icons/master/src/core/blue600.png">

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #1e90ff;
      color: white;
    }

    header {
      background: #003f88;
      padding: 20px;
      text-align: center;
      font-size: 32px;
      font-weight: bold;
    }

    .game-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 20px;
      padding: 20px;
    }

    .game-card {
      background: #005bbb;
      padding: 15px;
      border-radius: 10px;
      text-align: center;
      border: 2px solid #003f88;
    }

    button {
      background: none;
      border: none;
      color: white;
      font-size: 20px;
      cursor: pointer;
    }
  </style>
</head>
<body>

<header>School‑Safe Game Hub</header>

<h2 style="margin-left:20px;">🎮 Unblocked Games</h2>

<div class="game-grid">

  <div class="game-card">
    <button onclick="window.open('https://www.mathplayground.com/games.html', '_blank')">
      Math Playground Games
    </button>
  </div>

  <div class="game-card">
    <button onclick="window.open('https://www.mathnook.com/math/', '_blank')">
      MathNook Games
    </button>
  </div>

</div>

</body>
</html>
