<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">

  <title>Power School</title>

  <link rel="icon" type="image/png" href="https://raw.githubusercontent.com/google/material-design-icons/master/src/core/blue600.png">

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #1e90ff;
      color: white;
    }

    header {
      background: #003f88;
      padding: 20px;
      text-align: center;
      font-size: 32px;
      font-weight: bold;
      letter-spacing: 1px;
    }

    #search-container {
      text-align: center;
      margin: 20px;
    }

    #search {
      width: 60%;
      max-width: 500px;
      padding: 12px;
      font-size: 18px;
      border-radius: 8px;
      border: none;
      outline: none;
    }

    .section-title {
      font-size: 26px;
      margin: 20px;
      border-left: 5px solid white;
      padding-left: 10px;
    }

    .game-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 20px;
      padding: 20px;
    }

    .game-card {
      background: #005bbb;
      padding: 15px;
      border-radius: 10px;
      text-align: center;
      border: 2px solid #003f88;
      transition: 0.2s;
    }

    .game-card:hover {
      transform: scale(1.05);
      background: #0077ff;
    }

    button {
      background: none;
      border: none;
      color: white;
      font-size: 20px;
      font-weight: bold;
      cursor: pointer;
    }

    button:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>

<header>School‑Safe Game Hub</header>

<div id="search-container">
  <input type="text" id="search" placeholder="Search for a game...">
</div>

<h2 class="section-title">🚗 Racing Games (Unblocked)</h2>
<div class="game-grid">

  <div class="game-card" data-name="Drift Boss">
    <button onclick="window.open('https://www.mathplayground.com/drift_boss.html', '_blank')">
      Drift Boss
    </button>
  </div>

  <div class="game-card" data-name="Moto X3M">
    <button onclick="window.open('https://www.mathplayground.com/moto_x3m.html', '_blank')">
      Moto X3M
    </button>
  </div>

  <div class="game-card" data-name="Hill Climb Racing">
    <button onclick="window.open('https://www.mathplayground.com/logic_hill_climb_racing.html', '_blank')">
      Hill Climb Racing
    </button>
  </div>

</div>

<h2 class="section-title">🏃 Action & Platformers (Unblocked)</h2>
<div class="game-grid">

  <div class="game-card" data-name="Run 3">
    <button onclick="window.open('https://www.mathplayground.com/run_3.html', '_blank')">
      Run 3
    </button>
  </div>

  <div class="game-card" data-name="Fireboy and Watergirl">
    <button onclick="window.open('https://www.mathplayground.com/logic_fireboy_watergirl_forest_temple.html', '_blank')">
      Fireboy & Watergirl
    </button>
  </div>

</div>

<h2 class="section-title">🎣 Arcade & Puzzle (Unblocked)</h2>
<div class="game-grid">

  <div class="game-card" data-name="Tiny Fishing">
    <button onclick="window.open('https://www.mathnook.com/math/fishing-game-tiny-fishing.html', '_blank')">
      Tiny Fishing
    </button>
  </div>

</div>

<script>
  const searchInput = document.getElementById("search");
  const gameCards = document.querySelectorAll(".game-card");

  searchInput.addEventListener("input", () => {
    const query = searchInput.value.toLowerCase();

    gameCards.forEach(card => {
      const name = card.getAttribute("data-name").toLowerCase();
      card.style.display = name.includes(query) ? "block" : "none";
    });
  });
</script>

</body>
</html>
