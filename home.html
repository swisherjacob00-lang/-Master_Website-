<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Power School</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #1e90ff;
      color: white;
      display: flex;
      height: 100vh;
      overflow: hidden;
    }

    header {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      background: #003f88;
      padding: 15px;
      text-align: center;
      font-size: 26px;
      font-weight: bold;
      z-index: 2;
    }

    #sidebar {
      margin-top: 60px;
      width: 280px;
      background: #005bbb;
      padding: 10px;
      overflow-y: auto;
      box-sizing: border-box;
    }

    #sidebar h2 {
      font-size: 20px;
      margin: 10px 0;
      border-left: 4px solid white;
      padding-left: 8px;
    }

    .game-button {
      width: 100%;
      text-align: left;
      background: #0077ff;
      border: none;
      color: white;
      padding: 8px 10px;
      margin: 4px 0;
      border-radius: 6px;
      cursor: pointer;
      font-size: 15px;
    }

    .game-button:hover {
      background: #3399ff;
    }

    #main {
      margin-top: 60px;
      flex: 1;
      background: #003f88;
      padding: 10px;
      box-sizing: border-box;
      display: flex;
      flex-direction: column;
    }

    #gameFrameContainer {
      flex: 1;
      background: black;
      border-radius: 8px;
      overflow: hidden;
    }

    #gameFrame {
      width: 100%;
      height: 100%;
      border: none;
      background: black;
    }

    #search {
      width: 100%;
      padding: 8px;
      margin-bottom: 8px;
      border-radius: 6px;
      border: none;
      font-size: 14px;
    }

    .game-item {
      display: block;
    }
  </style>
</head>
<body>

<header>Master’s Toy Theater Hub</header>

<div id="sidebar">
  <input id="search" type="text" placeholder="Search games...">

  <h2>Board & Strategy</h2>
  <div class="game-item">
    <button class="game-button" data-name="Goose Game"
      onclick="openGame('https://toytheater.com/goose-game/')">
      Goose Game
    </button>
  </div>
  <div class="game-item">
    <button class="game-button" data-name="Checkers"
      onclick="openGame('https://toytheater.com/checkers/')">
      Checkers
    </button>
  </div>
  <div class="game-item">
    <button class="game-button" data-name="Chess"
      onclick="openGame('https://toytheater.com/chess/')">
      Chess
    </button>
  </div>
  <div class="game-item">
    <button class="game-button" data-name="Connect 4"
      onclick="openGame('https://toytheater.com/connect-4/')">
      Connect 4
    </button>
  </div>
  <div class="game-item">
    <button class="game-button" data-name="Reversi"
      onclick="openGame('https://toytheater.com/reversi/')">
      Reversi
    </button>
  </div>

  <h2>Math & Logic</h2>
  <div class="game-item">
    <button class="game-button" data-name="Math Pacman"
      onclick="openGame('https://toytheater.com/math-pacman/')">
      Math Pacman
    </button>
  </div>
  <div class="game-item">
    <button class="game-button" data-name="Math Lines"
      onclick="openGame('https://toytheater.com/math-lines/')">
      Math Lines
    </button>
  </div>
  <div class="game-item">
    <button class="game-button" data-name="Number Bonds"
      onclick="openGame('https://toytheater.com/number-bonds/')">
      Number Bonds
    </button>
  </div>
  <div class="game-item">
    <button class="game-button" data-name="Fraction Bars"
      onclick="openGame('https://toytheater.com/fraction-bars/')">
      Fraction Bars
    </button>
  </div>
  <div class="game-item">
    <button class="game-button" data-name="Hundreds Chart"
      onclick="openGame('https://toytheater.com/hundreds-chart/')">
      Hundreds Chart
    </button>
  </div>

  <h2>Arcade & Fun</h2>
  <div class="game-item">
    <button class="game-button" data-name="Space Race"
      onclick="openGame('https://toytheater.com/space-race/')">
      Space Race
    </button>
  </div>
  <div class="game-item">
    <button class="game-button" data-name="Brick Breaker"
      onclick="openGame('https://toytheater.com/brick-breaker/')">
      Brick Breaker
    </button>
  </div>
  <div class="game-item">
    <button class="game-button" data-name="Car Race"
      onclick="openGame('https://toytheater.com/car-race/')">
      Car Race
    </button>
  </div>
  <div class="game-item">
    <button class="game-button" data-name="Maze Game"
      onclick="openGame('https://toytheater.com/maze-game/')">
      Maze Game
    </button>
  </div>
  <div class="game-item">
    <button class="game-button" data-name="Platform Game"
      onclick="openGame('https://toytheater.com/platform-game/')">
      Platform Game
    </button>
  </div>

  <h2>Creativity & Tools</h2>
  <div class="game-item">
    <button class="game-button" data-name="Paint"
      onclick="openGame('https://toytheater.com/paint/')">
      Paint
    </button>
  </div>
  <div class="game-item">
    <button class="game-button" data-name="Tangrams"
      onclick="openGame('https://toytheater.com/tangrams/')">
      Tangrams
    </button>
  </div>
  <div class="game-item">
    <button class="game-button" data-name="Pattern Blocks"
      onclick="openGame('https://toytheater.com/pattern-blocks/')">
      Pattern Blocks
    </button>
  </div>
  <div class="game-item">
    <button class="game-button" data-name="Geoboard"
      onclick="openGame('https://toytheater.com/geoboard/')">
      Geoboard
    </button>
  </div>
  <div class="game-item">
    <button class="game-button" data-name="Clock"
      onclick="openGame('https://toytheater.com/clock/')">
      Clock
    </button>
  </div>

</div>

<div id="main">
  <div id="gameFrameContainer">
    <iframe id="gameFrame" src="https://toytheater.com/goose-game/"></iframe>
  </div>
</div>

<script>
  function openGame(url) {
    document.getElementById('gameFrame').src = url;
  }

  const searchInput = document.getElementById('search');
  const gameItems = document.querySelectorAll('.game-item');

  searchInput.addEventListener('input', () => {
    const q = searchInput.value.toLowerCase();
    gameItems.forEach(item => {
      const btn = item.querySelector('.game-button');
      const name = btn.getAttribute('data-name').toLowerCase();
      item.style.display = name.includes(q) ? 'block' : 'none';
    });
  });
</script>

</body>
</html>
