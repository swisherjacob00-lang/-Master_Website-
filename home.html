<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Master's Gaming Hub</title>

  <!-- Link to your CSS file -->
  <link rel="stylesheet" href="style.css">

  <style>
    header {
      background: rgba(0, 0, 0, 0.6);
      padding: 20px;
      text-align: center;
      font-size: 32px;
      font-weight: bold;
      position: sticky;
      top: 0;
      z-index: 10;
      backdrop-filter: blur(6px);
    }

    #search-container {
      text-align: center;
      margin: 20px;
    }

    #search {
      width: 60%;
      max-width: 500px;
      padding: 12px;
      font-size: 18px;
      border-radius: 8px;
      border: none;
      outline: none;
    }

    .section-title {
      font-size: 26px;
      margin: 20px;
      border-left: 5px solid white;
      padding-left: 10px;
      background: rgba(0, 0, 0, 0.4);
      display: inline-block;
      backdrop-filter: blur(4px);
    }

    .game-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 20px;
      padding: 20px;
    }

    .game-card {
      background: rgba(0, 0, 0, 0.55);
      padding: 15px;
      border-radius: 10px;
      border: 2px solid rgba(255, 255, 255, 0.3);
      backdrop-filter: blur(4px);
    }

    iframe {
      width: 100%;
      height: 400px;
      border: none;
      border-radius: 10px;
      background: black;
    }

    .game-title {
      text-align: center;
      font-size: 20px;
      font-weight: bold;
      margin-bottom: 10px;
    }
  </style>
</head>
<body>

<header>Master's Gaming Hub</header>

<div id="search-container">
  <input type="text" id="search" placeholder="Search for a game...">
</div>

<script>
  function filterGames() {
    const query = document.getElementById("search").value.toLowerCase();
    const cards = document.querySelectorAll(".game-card");

    cards.forEach(card => {
      const name = card.getAttribute("data-name").toLowerCase();
      card.style.display = name.includes(query) ? "block" : "none";
    });
  }

  document.getElementById("search").addEventListener("input", filterGames);
</script>

<h2 class="section-title">🎮 Arcade Games</h2>
<div class="game-grid">

  <div class="game-card" data-name="Slope">
    <div class="game-title">Slope</div>
    <iframe src=""></iframe>
  </div>

  <div class="game-card" data-name="Tag">
    <div class="game-title">Tag</div>
    <iframe src=""></iframe>
  </div>

  <div class="game-card" data-name="Run 3">
    <div class="game-title">Run 3</div>
    <iframe src=""></iframe>
  </div>

</div>

</body>
</html>
