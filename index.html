<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Master’s Game Hub</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #1e90ff; /* BLUE BACKGROUND */
      color: white;
    }

    header {
      background: #003f88;
      padding: 20px;
      text-align: center;
      font-size: 32px;
      font-weight: bold;
      letter-spacing: 1px;
    }

    #search-container {
      text-align: center;
      margin: 20px;
    }

    #search {
      width: 60%;
      max-width: 500px;
      padding: 12px;
      font-size: 18px;
      border-radius: 8px;
      border: none;
      outline: none;
    }

    .section-title {
      font-size: 26px;
      margin: 20px;
      border-left: 5px solid white;
      padding-left: 10px;
    }

    .game-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 20px;
      padding: 20px;
    }

    .game-card {
      background: #005bbb;
      padding: 15px;
      border-radius: 10px;
      text-align: center;
      border: 2px solid #003f88;
      transition: 0.2s;
    }

    .game-card:hover {
      transform: scale(1.05);
      background: #0077ff;
    }

    a {
      color: white;
      text-decoration: none;
      font-size: 20px;
      font-weight: bold;
    }
  </style>
</head>
<body>

<header>Master’s Game Hub</header>

<div id="search-container">
  <input type="text" id="search" placeholder="Search for a game...">
</div>

<h2 class="section-title">Games</h2>

<div class="game-grid" id="game-list">

  <div class="game-card" data-name="Slope">
    <a href="https://slope-game.io/">Slope</a>
  </div>

  <div class="game-card" data-name="Basket Random">
    <a href="https://basketball-random.io/">Basket Random</a>
  </div>

  <div class="game-card" data-name="Run 3">
    <a href="https://run3.io/">Run 3</a>
  </div>

  <div class="game-card" data-name="Flappy Bird">
    <a href="https://flappybird.io/">Flappy Bird</a>
  </div>

  <div class="game-card" data-name="2048">
    <a href="https://play2048.co/">2048</a>
  </div>

  <div class="game-card" data-name="Stack">
    <a href="https://stack-game.github.io/">Stack</a>
  </div>

</div>

<script>
  const searchInput = document.getElementById("search");
  const gameCards = document.querySelectorAll(".game-card");

  searchInput.addEventListener("input", () => {
    const query = searchInput.value.toLowerCase();

    gameCards.forEach(card => {
      const name = card.getAttribute("data-name").toLowerCase();
      card.style.display = name.includes(query) ? "block" : "none";
    });
  });
</script>

</body>
</html>
