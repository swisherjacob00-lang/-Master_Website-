<!DOCTYPE html>
<html>
<head>
<title>Master’s Game Hub</title>
<style>
  body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #111;
    color: white;
  }

  header {
    background: #222;
    padding: 20px;
    text-align: center;
    font-size: 32px;
    font-weight: bold;
  }

  #search-container {
    text-align: center;
    margin: 20px;
  }

  #search {
    width: 60%;
    padding: 12px;
    font-size: 18px;
    border-radius: 8px;
    border: none;
  }

  .section-title {
    font-size: 26px;
    margin: 20px;
    border-left: 5px solid #0ff;
    padding-left: 10px;
  }

  .game-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
    gap: 20px;
    padding: 20px;
  }

  .game-card {
    background: #1c1c1c;
    padding: 15px;
    border-radius: 10px;
    text-align: center;
    border: 1px solid #333;
    cursor: pointer;
    transition: 0.2s;
  }

  .game-card:hover {
    transform: scale(1.05);
    border-color: #0ff;
  }

  #viewer {
    width: 100%;
    height: 600px;
    background: #000;
    display: none;
    border-top: 3px solid #0ff;
  }

  #viewer iframe {
    width: 100%;
    height: 100%;
    border: none;
  }

  #closeBtn {
    display: none;
    background: #0ff;
    color: #000;
    padding: 10px 20px;
    border: none;
    font-size: 18px;
    cursor: pointer;
    margin: 10px;
    border-radius: 6px;
  }
</style>
</head>
<body>

<header>Master’s Game Hub</header>

<div id="search-container">
  <input type="text" id="search" placeholder="Search for a game...">
</div>

<h2 class="section-title">Games</h2>

<div class="game-grid" id="game-list">

  <div class="game-card" data-name="Slope" data-url="https://ubg98.github.io/Slope/">
    Slope
  </div>

  <div class="game-card" data-name="Basket Random" data-url="https://ubg98.github.io/basket-random/">
    Basket Random
  </div>

  <div class="game-card" data-name="Run 3" data-url="https://ubg98.github.io/run-3/">
    Run 3
  </div>

  <div class="game-card" data-name="Flappy Bird" data-url="https://ubg98.github.io/flappy-bird/">
    Flappy Bird
  </div>

  <div class="game-card" data-name="2048" data-url="https://ubg98.github.io/2048/">
    2048
  </div>

  <div class="game-card" data-name="Stack" data-url="https://ubg98.github.io/stack/">
    Stack
  </div>

</div>

<button id="closeBtn">Close Game</button>
<div id="viewer">
  <iframe id="gameFrame"></iframe>
</div>

<script>
  const searchInput = document.getElementById("search");
  const gameCards = document.querySelectorAll(".game-card");
  const viewer = document.getElementById("viewer");
  const gameFrame = document.getElementById("gameFrame");
  const closeBtn = document.getElementById("closeBtn");

  searchInput.addEventListener("input", () => {
    const query = searchInput.value.toLowerCase();
    gameCards.forEach(card => {
      const name = card.getAttribute("data-name").toLowerCase();
      card.style.display = name.includes(query) ? "block" : "none";
    });
  });

  gameCards.forEach(card => {
    card.addEventListener("click", () => {
      const url = card.getAttribute("data-url");
      viewer.style.display = "block";
      closeBtn.style.display = "inline-block";
      gameFrame.src = url;
      window.scrollTo(0, viewer.offsetTop);
    });
  });

  closeBtn.addEventListener("click", () => {
    viewer.style.display = "none";
    closeBtn.style.display = "none";
    gameFrame.src = "";
  });
</script>

</body>
</html>
